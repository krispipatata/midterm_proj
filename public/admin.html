<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Appointment Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div>
      <div class="logo">Admin Dashboard</div>

      <div class="menu">
        <a href="#" class="active" onclick="showTab('appointments')">
          Appointments <span id="notifBadge" class="badge">0</span>
        </a>
        <a href="#" onclick="showTab('history')">History</a>
      </div>
    </div>

    <div class="profile">
      <p>Admin</p>
      <p>admin@university.edu</p>
      <div class="logout">Logout</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2 id="title">Manage Appointments</h2>

      <div>
        <input type="text" id="search" class="search" placeholder="Search student...">
        <button class="add-btn" onclick="openModal()">+ Add</button>
      </div>
    </div>

    <!-- ACTIVE TABLE -->
    <div class="table-container" id="appointmentsTab">
      <table id="apptTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Appointment</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- HISTORY TABLE -->
    <div class="table-container" id="historyTab" style="display:none;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
              <th>Appointment</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button onclick="closeModal()" style="float:right;">❌</button>
    <h3>Add Appointment</h3>
    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="dept" placeholder="Department">
    <input type="datetime-local" id="date">
    <button onclick="addAppt()">Save</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="dashboard.js"></script>

<script>
const SERVER = "http://localhost:3000";

function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function toggleSidebar() {
  document.querySelector(".sidebar").classList.toggle("active");
}

function showTab(tab){
  document.getElementById("appointmentsTab").style.display =
    tab === "appointments" ? "block" : "none";

  document.getElementById("historyTab").style.display =
    tab === "history" ? "block" : "none";

  document.getElementById("title").innerText =
    tab === "history" ? "History" : "Manage Appointments";
}

async function addAppt() {
  const name = document.getElementById("name").value;
  const dept = document.getElementById("dept").value;
  const date = document.getElementById("date").value;

  if(!name || !dept || !date){
    alert("Please fill all fields");
    return;
  }

  try {
    await fetch(SERVER + "/book", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        name,
        course: dept,
        date,
        status: "Pending"
      })
    });

    alert("Appointment Added!");
    closeModal();

  } catch(err){
    console.error(err);
    alert("Server not connected!");
  }
}
</script>
