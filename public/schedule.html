<!DOCTYPE html>
<html>
<head>
    <title>Select Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <div class="calendar-header">
        <button id="prev">←</button>
        <h3 id="monthYear"></h3>
        <button id="next">→</button>
    </div>

    <div class="calendar" id="calendar"></div>

    <div class="time-section">
        <h4>Availability</h4>
        <div id="timeSlots">
            <label><input type="radio" name="time" value="09:00 AM"> 09:00 AM</label>
            <label><input type="radio" name="time" value="09:30 AM"> 09:30 AM</label>
            <label><input type="radio" name="time" value="10:00 AM"> 10:00 AM</label>
            <label><input type="radio" name="time" value="10:30 AM"> 10:30 AM</label>
        </div>
    </div>
    <button id="confirmBtn">Next Step</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/schedule.js"></script>

</body>
</html>
