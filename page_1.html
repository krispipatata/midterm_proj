<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APPOINTMENT BOOKING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 class="title">APPOINTMENT BOOKING</h2>

    <div class="form-section">
        <label>Appointment:</label>
            <select>
                <option value="">-- select appointment--</option>
                <option>Card Issuance</option>
                <option>Enrollment</option>
                <option>ID Issuance</option>
                <option>Guidance Counseling</option>
                <option>Reissuance of Green Card</option>
                <option>Health Appointment</option>
            </select required>
        
        <label>Name:</label>
        <div class="name">

         <input type="text" placeholder="First Name" required>
         <input type="text" placeholder="Middle Name" required>
         <input type="text" placeholder="Last Name" required>
        
        </div>

        <div class="course">
            <div>
             <label>Course:</label>
                <select>
                 <option value="">-- select course--</option>
                 <option value="bsit">BS Information Technology</option>
                 <option value="bscrim">BS Criminalogy</option>
                 <option value="bsba">BS Business Administration</option>
                 <option value="bsfi">BS Fisheries</option>
                 <option value="bsed">Bachelor of Secondary Education</option>
                 <option value="beed">Bachelor of Elementary Education</option>
                </select>
            </div>

            <div>
             <label>Year:</label>
               <select>
                <option value="">-- select year --</option>
                <option value="1st">1st Year</option>
                <option value="2nd">2nd Year</option>
                <option value="3rd">3rd Year</option>
                <option value="4th">4th Year</option>
               </select>
            </div>

            <div>
             <label>Section:</label>
                <input type="number" required>
            </div>
        </div>

        <label>Date:</label>
        <input type="date" placeholder="mm/dd/yy" required>

        <label>Purpose</label>
        <input type="text" placeholder="e.g for scholarship">

        <label>Email:</label>
        <input type="email" required>

        <label>Contact Number:</label>
        <input type="number" required>
           
    </div>

    <a href="page_2.html" class="nav-btn">NEXT</a>
    
</body>
</html>
